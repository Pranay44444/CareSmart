name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          if [ -z "$EC2_SSH_KEY" ] || [ -z "$EC2_HOST" ]; then
            echo "EC2 secrets not configured, skipping deploy."
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/caresmart-key.pem
          chmod 600 ~/.ssh/caresmart-key.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          if [ -z "$EC2_SSH_KEY" ] || [ -z "$EC2_HOST" ]; then
            echo "EC2 secrets not configured, skipping deploy."
            exit 0
          fi
          ssh -i ~/.ssh/caresmart-key.pem -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" << 'EOF'
            cd /home/ubuntu/CareSmart
            git pull origin main
            cd server && npm install --production
            pm2 restart caresmart-backend || pm2 start src/index.js --name caresmart-backend
            pm2 save
          EOF

      - name: Success
        run: echo "Deployed to EC2 successfully"
