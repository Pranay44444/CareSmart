name: PR Checks and Linting

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Install server dependencies
        run: cd server && npm install

      - name: Run ESLint on backend and generate summary
        run: |
          cd server
          echo "### Backend ESLint Results 🔬" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          
          # Run lint and capture output, ignoring failures temporarily
          npm run lint >> $GITHUB_STEP_SUMMARY 2>&1 || true
          
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          # Run it again to properly fail the action if it encounters an exit code > 0
          npm run lint

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Install frontend dependencies
        run: cd client && npm install

      - name: Run ESLint on frontend
        # Because we previously configured client/package.json with --max-warnings 0,
        # this will automatically throw exit code > 0 if any strict lint rules fail
        run: cd client && npm run lint

  prettier-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Install root dependencies (Prettier)
        run: npm install

      - name: Verify Code Formatting
        run: npx prettier --check "client/src/**/*.{js,jsx}" "server/src/**/*.js"
