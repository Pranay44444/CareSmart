name: Deploy to ECR + ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: caresmart-cluster
  BACKEND_ECR_REPO: caresmart-backend
  FRONTEND_ECR_REPO: caresmart-frontend
  BACKEND_SERVICE: caresmart-backend-service
  FRONTEND_SERVICE: caresmart-frontend-service
  BACKEND_CONTAINER: caresmart-backend
  FRONTEND_CONTAINER: caresmart-frontend

jobs:
  # ── 1. Run tests before deploying ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install & test backend
        run: cd server && npm ci && npm test
        env:
          MONGO_URI: mongodb://localhost:27017/caresmart_test
          JWT_SECRET: test_secret_key_for_ci
          NODE_ENV: test

      - name: Install & build frontend
        run: cd client && npm ci && npm run build
        env:
          VITE_API_URL: http://localhost:5001

  # ── 2. Build, tag, push images to ECR ─────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      backend-image: ${{ steps.backend-build.outputs.image }}
      frontend-image: ${{ steps.frontend-build.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Backend image ──────────────────────────────────────────────────────
      - name: Build, tag, and push backend image
        id: backend-build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/${{ env.BACKEND_ECR_REPO }}

          docker build -t $IMAGE_URI:$IMAGE_TAG -t $IMAGE_URI:latest ./server

          docker push $IMAGE_URI:$IMAGE_TAG
          docker push $IMAGE_URI:latest

          echo "image=$IMAGE_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Frontend image ─────────────────────────────────────────────────────
      - name: Build, tag, and push frontend image
        id: frontend-build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/${{ env.FRONTEND_ECR_REPO }}

          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t $IMAGE_URI:$IMAGE_TAG \
            -t $IMAGE_URI:latest \
            ./client

          docker push $IMAGE_URI:$IMAGE_TAG
          docker push $IMAGE_URI:latest

          echo "image=$IMAGE_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ── 3. Deploy backend to ECS ───────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to ECS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Substitute placeholders in task definition
        run: |
          export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          export AWS_REGION=${{ env.AWS_REGION }}
          export MONGO_URI=${{ secrets.MONGO_URI }}
          export JWT_SECRET=${{ secrets.JWT_SECRET }}
          export GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          envsubst < ecs/task-definition-backend.json > ecs/task-definition-backend-filled.json

      - name: Render ECS task definition with new backend image
        id: render-backend-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs/task-definition-backend-filled.json
          container-name: ${{ env.BACKEND_CONTAINER }}
          image: ${{ needs.build-and-push.outputs.backend-image }}

      - name: Deploy backend service to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend-task.outputs.task-definition }}
          service: ${{ env.BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ── 4. Deploy frontend to ECS ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to ECS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Substitute placeholders in task definition
        run: |
          export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          export AWS_REGION=${{ env.AWS_REGION }}
          envsubst < ecs/task-definition-frontend.json > ecs/task-definition-frontend-filled.json

      - name: Render ECS task definition with new frontend image
        id: render-frontend-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs/task-definition-frontend-filled.json
          container-name: ${{ env.FRONTEND_CONTAINER }}
          image: ${{ needs.build-and-push.outputs.frontend-image }}

      - name: Deploy frontend service to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend-task.outputs.task-definition }}
          service: ${{ env.FRONTEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ── 5. Post-deploy summary ─────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Print deployment result
        run: |
          echo "### CareSmart Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service  | Image Tag | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | \`${{ github.sha }}\` | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ github.sha }}\` | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Cluster:** \`caresmart-cluster\`" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** \`${{ env.AWS_REGION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
