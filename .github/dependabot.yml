version: 2
updates:
  # 1. Checks npm dependencies in /client every week on Monday
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "frontend"
    reviewers:
      - "Pranay44444"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  # 2. Checks npm dependencies in /server every week on Monday
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "backend"
    reviewers:
      - "Pranay44444"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  # 3. Checks GitHub Actions in root every week on Monday
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "Pranay44444"
    commit-message:
      prefix: "chore(ci)"
    open-pull-requests-limit: 5
