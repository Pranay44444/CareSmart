version: "3.9"

services:
  backend:
    build: ./server
    container_name: caresmart-backend
    ports:
      - "5001:5001"
    env_file:
      - ./server/.env
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      args:
        - VITE_API_URL=http://localhost:5001
    container_name: caresmart-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: caresmart-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
